name: telemetry

on:
  schedule:
    - cron: '17 4 * * *'   # daily sync
  workflow_dispatch:        # manual refresh from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate telemetry panel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/telemetry.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/telemetry.svg
          git diff --cached --quiet || { git commit -m "telemetry: daily sync"; git push; }
