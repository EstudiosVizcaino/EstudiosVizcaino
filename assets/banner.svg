<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" role="img" aria-label="César Vizcaíno — Programmer, IoT maker, IT technician. From idea to working device.">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#05070d"/>
      <rect y="3" width="4" height="1" fill="#0a1220"/>
    </pattern>
    <radialGradient id="vign" cx="50%" cy="45%" r="75%">
      <stop offset="55%" stop-color="#05070d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020409" stop-opacity=".8"/>
    </radialGradient>
    <clipPath id="typeclip">
      <rect x="312" y="218" width="0" height="34">
        <animate attributeName="width" begin="1.2s" dur="2.2s" fill="freeze" calcMode="discrete"
          values="0;36;72;108;144;180;216;252;288;324;360;396;432;468;504;540;576"/>
      </rect>
    </clipPath>
  </defs>

  <!-- void + scanlines + vignette -->
  <rect width="1200" height="300" fill="url(#scan)"/>
  <rect width="1200" height="300" fill="url(#vign)"/>

  <!-- HUD corner brackets -->
  <g stroke="#38e1ff" stroke-opacity=".55" stroke-width="1.5" fill="none">
    <path d="M14 40V14h26"/><path d="M1160 14h26v26"/>
    <path d="M14 260v26h26"/><path d="M1186 260v26h-26"/>
  </g>

  <!-- HUD top lines -->
  <text x="56" y="34" font-size="12" letter-spacing="6" fill="#38e1ff" filter="url(#glow-cyan)">ESTUDIOS VIZCAÍNO <tspan fill="#ffb648">// GITHUB PROFILE</tspan></text>
  <text x="1144" y="34" text-anchor="end" font-size="12" letter-spacing="4" fill="#6f8aa8">MADRID · SPAIN
    <animate attributeName="opacity" values="1;1;.4;1" keyTimes="0;.9;.95;1" dur="7s" repeatCount="indefinite"/>
  </text>

  <!-- rotating holocron — left -->
  <g transform="translate(150,160)" fill="none">
    <g stroke="#38e1ff" stroke-width="1.6" filter="url(#glow-cyan)">
      <rect x="-52" y="-52" width="104" height="104">
        <animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="26s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g stroke="#4a9eff" stroke-width="1.2">
      <rect x="-34" y="-34" width="68" height="68">
        <animateTransform attributeName="transform" type="rotate" from="66" to="-294" dur="20s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g stroke="#ffb648" stroke-width="1.6" filter="url(#glow-amber)">
      <rect x="-17" y="-17" width="34" height="34">
        <animateTransform attributeName="transform" type="rotate" from="45" to="405" dur="12s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- rotating holocron — right -->
  <g transform="translate(1050,160)" fill="none">
    <g stroke="#38e1ff" stroke-width="1.6" filter="url(#glow-cyan)">
      <rect x="-52" y="-52" width="104" height="104">
        <animateTransform attributeName="transform" type="rotate" from="45" to="-315" dur="26s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g stroke="#4a9eff" stroke-width="1.2">
      <rect x="-34" y="-34" width="68" height="68">
        <animateTransform attributeName="transform" type="rotate" from="24" to="384" dur="20s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g stroke="#ffb648" stroke-width="1.6" filter="url(#glow-amber)">
      <rect x="-17" y="-17" width="34" height="34">
        <animateTransform attributeName="transform" type="rotate" from="45" to="-315" dur="12s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- kicker -->
  <text x="600" y="112" text-anchor="middle" font-size="15" letter-spacing="9" fill="#6f8aa8">PROGRAMMER · IOT MAKER · IT TECHNICIAN</text>

  <!-- name -->
  <text x="600" y="178" text-anchor="middle" font-size="58" font-weight="800" letter-spacing="14" fill="#eaf8ff" filter="url(#glow-cyan)">CÉSAR VIZCAÍNO
    <animate attributeName="opacity" values="1;1;.75;1;1" keyTimes="0;.62;.64;.66;1" dur="9s" repeatCount="indefinite"/>
  </text>

  <!-- typed tagline + caret -->
  <g font-family="ui-monospace, 'Cascadia Mono', 'Courier New', monospace">
    <text x="314" y="244" font-size="24" letter-spacing="6" fill="#38e1ff" clip-path="url(#typeclip)" filter="url(#glow-cyan)">FROM IDEA TO WORKING DEVICE.</text>
    <rect y="224" width="12" height="24" fill="#38e1ff">
      <animate attributeName="x" begin="1.2s" dur="2.2s" fill="freeze" calcMode="discrete"
        values="316;352;388;424;460;496;532;568;604;640;676;712;748;784;820;856;892"/>
      <animate attributeName="opacity" begin="3.6s" values="1;0;1" keyTimes="0;.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- footer coordinates -->
  <text x="600" y="282" text-anchor="middle" font-size="11" letter-spacing="6" fill="#6f8aa8">SOFTWARE ENGINEERING <tspan fill="#ffb648">·</tspan> 42 MADRID <tspan fill="#ffb648">·</tspan> EMBEDDED &amp; IOT</text>

  <!-- sweeping scan beam -->
  <rect x="0" y="0" width="1200" height="3" fill="#38e1ff" opacity=".14">
    <animate attributeName="y" values="0;297;0" dur="14s" repeatCount="indefinite"/>
  </rect>
</svg>
